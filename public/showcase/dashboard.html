<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tactical Telemetry Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          colors: {
            glass: 'rgba(255, 255, 255, 0.03)',
            glassBorder: 'rgba(255, 255, 255, 0.08)',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #050505; color: #EAEAEA; overflow: hidden; }
    .bg-mesh {
      position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(circle at 15% 50%, rgba(202, 138, 4, 0.08), transparent 25%),
                  radial-gradient(circle at 85% 30%, rgba(202, 138, 4, 0.05), transparent 25%);
    }
    .doppelrand {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 6px;
      border-radius: 2rem;
    }
    .doppelrand-inner {
      background: #0A0A0A;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
      border-radius: calc(2rem - 6px);
      height: 100%;
    }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
    
    .cubic-transition { transition: all 700ms cubic-bezier(0.32,0.72,0,1); }
  </style>
</head>
<body class="antialiased flex h-screen w-full selection:bg-yellow-600 selection:text-white">
  <div class="bg-mesh"></div>

  <!-- Sidebar -->
  <aside class="w-20 lg:w-72 flex-shrink-0 border-r border-white/5 flex flex-col justify-between py-8 px-4 lg:px-8 cubic-transition group z-10 bg-black/40 backdrop-blur-3xl">
    <div>
      <div class="flex items-center gap-4 mb-16 cursor-pointer">
        <div class="w-10 h-10 rounded-full border border-yellow-600 flex items-center justify-center flex-shrink-0 bg-yellow-600/10">
          <i class="ph ph-asterisk text-yellow-600 text-xl"></i>
        </div>
        <h1 class="font-bold tracking-tighter text-xl hidden lg:block">SITEPLASM<span class="text-yellow-600">*</span></h1>
      </div>

      <nav class="space-y-2">
        <a href="#" onclick="activateTab(this)" class="nav-item flex items-center gap-4 px-4 py-3 rounded-full bg-white/10 text-white cubic-transition">
          <i class="ph-light ph-squares-four text-xl"></i>
          <span class="font-mono text-[10px] tracking-widest uppercase hidden lg:block">Telemetry</span>
        </a>
        <a href="#" onclick="activateTab(this)" class="nav-item flex items-center gap-4 px-4 py-3 rounded-full text-white/40 hover:bg-white/5 hover:text-white cubic-transition">
          <i class="ph-light ph-users text-xl"></i>
          <span class="font-mono text-[10px] tracking-widest uppercase hidden lg:block">Operatives</span>
        </a>
        <a href="#" onclick="activateTab(this)" class="nav-item flex items-center gap-4 px-4 py-3 rounded-full text-white/40 hover:bg-white/5 hover:text-white cubic-transition">
          <i class="ph-light ph-chart-line-up text-xl"></i>
          <span class="font-mono text-[10px] tracking-widest uppercase hidden lg:block">Revenue Map</span>
        </a>
      </nav>
    </div>
    
    <div class="hidden lg:block">
      <div class="doppelrand p-1.5">
        <div class="doppelrand-inner p-4 flex items-center gap-4">
          <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-yellow-600 to-yellow-400"></div>
          <div>
            <div class="text-xs font-bold text-white">Admin Unit</div>
            <div class="text-[9px] font-mono text-white/40 uppercase">Root Access</div>
          </div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 overflow-y-auto p-6 lg:p-12 relative">
    <header class="flex justify-between items-center mb-12">
      <div>
        <span class="rounded-full px-3 py-1 text-[9px] font-mono uppercase tracking-[0.2em] border border-white/10 text-white/40 mb-4 inline-block">SYS_STATUS: OPTIMAL</span>
        <h2 class="text-4xl lg:text-5xl font-bold tracking-tight">Q3 Telemetry</h2>
      </div>
      <button class="group doppelrand p-1.5 cursor-pointer active:scale-95 cubic-transition" onclick="triggerSync()">
        <div class="doppelrand-inner px-6 py-3 flex items-center gap-3">
          <span class="font-mono text-[10px] tracking-widest uppercase text-white">Sync Data</span>
          <div class="w-6 h-6 rounded-full bg-white/10 flex items-center justify-center group-hover:bg-yellow-600 group-hover:text-black cubic-transition">
            <i class="ph ph-arrows-clockwise text-xs" id="sync-icon"></i>
          </div>
        </div>
      </button>
    </header>

    <!-- KPI Grid (Bento) -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <!-- Card 1 -->
      <div class="doppelrand md:col-span-2 hover:-translate-y-1 cubic-transition">
        <div class="doppelrand-inner p-8 flex flex-col justify-between relative overflow-hidden">
          <div class="absolute top-0 right-0 w-32 h-32 bg-yellow-600/10 blur-3xl rounded-full"></div>
          <div class="font-mono text-[10px] tracking-widest uppercase text-white/40 mb-8">Network Velocity</div>
          <div class="flex items-end gap-4">
            <div class="text-6xl lg:text-8xl font-bold tracking-tighter" id="velocity-val">99.8<span class="text-yellow-600 text-4xl">%</span></div>
            <div class="text-yellow-600 text-sm font-mono pb-2">+1.2% <i class="ph ph-trend-up"></i></div>
          </div>
        </div>
      </div>
      <!-- Card 2 -->
      <div class="doppelrand hover:-translate-y-1 cubic-transition">
        <div class="doppelrand-inner p-8 flex flex-col justify-between">
          <div class="font-mono text-[10px] tracking-widest uppercase text-white/40 mb-8">Active Nodes</div>
          <div>
            <div class="text-5xl font-bold tracking-tighter mb-2">1,024</div>
            <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden">
              <div class="h-full bg-white w-3/4"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Data Table Area -->
    <div class="doppelrand mb-24">
      <div class="doppelrand-inner p-8">
        <div class="flex justify-between items-center mb-8 border-b border-white/5 pb-4">
          <div class="font-mono text-[10px] tracking-widest uppercase text-white/40">Recent Executions</div>
          <i class="ph-light ph-dots-three text-white/40 text-xl cursor-pointer hover:text-white"></i>
        </div>
        <div class="space-y-4">
          <!-- Row -->
          <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl hover:bg-white/10 cubic-transition cursor-pointer group">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full bg-black border border-white/10 flex items-center justify-center text-white/50 group-hover:border-white/30 cubic-transition">
                <i class="ph-light ph-terminal-window"></i>
              </div>
              <div>
                <div class="text-sm font-bold text-white">Deploy_Alpha_V2</div>
                <div class="text-[10px] font-mono text-white/40 uppercase">Sector 7G</div>
              </div>
            </div>
            <div class="text-right">
              <div class="text-xs font-mono text-yellow-600 uppercase mb-1">Success</div>
              <div class="text-[10px] font-mono text-white/40 uppercase">2m ago</div>
            </div>
          </div>
          <!-- Row -->
          <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl hover:bg-white/10 cubic-transition cursor-pointer group">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full bg-black border border-white/10 flex items-center justify-center text-white/50 group-hover:border-white/30 cubic-transition">
                <i class="ph-light ph-database"></i>
              </div>
              <div>
                <div class="text-sm font-bold text-white">Sync_Cluster_Node</div>
                <div class="text-[10px] font-mono text-white/40 uppercase">Sector 4A</div>
              </div>
            </div>
            <div class="text-right">
              <div class="text-xs font-mono text-white uppercase mb-1">Processing</div>
              <div class="text-[10px] font-mono text-white/40 uppercase">Active</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Semi-functional logic
    function activateTab(el) {
      document.querySelectorAll('.nav-item').forEach(nav => {
        nav.classList.remove('bg-white/10', 'text-white');
        nav.classList.add('text-white/40');
      });
      el.classList.add('bg-white/10', 'text-white');
      el.classList.remove('text-white/40');
    }

    function triggerSync() {
      const icon = document.getElementById('sync-icon');
      const val = document.getElementById('velocity-val');
      
      icon.classList.add('animate-spin');
      setTimeout(() => {
        icon.classList.remove('animate-spin');
        val.innerHTML = (Math.random() * (99.9 - 98.0) + 98.0).toFixed(1) + '<span class="text-yellow-600 text-4xl">%</span>';
      }, 1000);
    }
  </script>
</body>
</html>
