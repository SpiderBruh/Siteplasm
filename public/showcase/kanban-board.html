<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow Kanban - Soft Structuralism</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          colors: {
            base: '#F4F5F7',
            ink: '#111827',
            accent: '#3B82F6',
          },
          boxShadow: {
            'ambient': '0 20px 40px -10px rgba(17, 24, 39, 0.05), 0 0 20px -5px rgba(17, 24, 39, 0.02)',
            'card': '0 4px 12px -2px rgba(17, 24, 39, 0.03)',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #F4F5F7; color: #111827; }
    .cubic-transition { transition: all 600ms cubic-bezier(0.32,0.72,0,1); }
    
    /* Double-Bezel Island */
    .island-outer {
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(17, 24, 39, 0.03);
      padding: 4px;
      border-radius: 1.5rem;
    }
    .island-inner {
      background: #FFFFFF;
      border-radius: calc(1.5rem - 4px);
      box-shadow: 0 2px 8px -2px rgba(17,24,39,0.02);
    }
    
    .k-card {
      background: #FFFFFF;
      border: 1px solid rgba(17, 24, 39, 0.04);
      border-radius: 1rem;
      box-shadow: var(--tw-shadow-card);
      cursor: grab;
    }
    .k-card:active { cursor: grabbing; }
    
    /* Kanban Drag/Drop pseudo-states */
    .k-card.moving { opacity: 0.5; transform: scale(0.98); }
    
    ::-webkit-scrollbar { width: 0px; background: transparent; }
  </style>
</head>
<body class="antialiased flex flex-col h-screen overflow-hidden selection:bg-accent selection:text-white">

  <!-- Header Island -->
  <header class="p-6 flex justify-between items-center z-10">
    <div class="island-outer shadow-ambient">
      <div class="island-inner px-6 py-3 flex items-center gap-6">
        <div class="flex items-center gap-2">
          <div class="w-6 h-6 rounded bg-accent/10 flex items-center justify-center text-accent">
            <i class="ph-fill ph-kanban"></i>
          </div>
          <span class="font-bold tracking-tight text-sm">FlowState</span>
        </div>
        <div class="w-[1px] h-4 bg-ink/10"></div>
        <nav class="flex items-center gap-6 font-mono text-[9px] uppercase tracking-widest text-ink/40 font-bold">
          <a href="#" class="text-ink hover:text-accent cubic-transition">Board</a>
          <a href="#" class="hover:text-ink cubic-transition">Timeline</a>
          <a href="#" class="hover:text-ink cubic-transition">Reports</a>
        </nav>
      </div>
    </div>
    
    <div class="flex items-center gap-4">
      <button class="w-10 h-10 rounded-full bg-white shadow-card flex items-center justify-center text-ink/50 hover:text-ink cubic-transition">
        <i class="ph-bold ph-bell"></i>
      </button>
      <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-accent to-blue-300 shadow-card border-2 border-white"></div>
    </div>
  </header>

  <div class="px-6 pb-6 flex items-end justify-between">
    <h1 class="text-5xl font-extrabold tracking-tighter">Q3 App Overhaul</h1>
    <button class="group island-outer active:scale-95 cubic-transition">
      <div class="island-inner bg-ink text-white px-5 py-2.5 flex items-center gap-4 rounded-full">
        <span class="font-sans text-xs font-bold">New Task</span>
        <div class="w-6 h-6 rounded-full bg-white/10 flex items-center justify-center group-hover:rotate-90 cubic-transition">
          <i class="ph-bold ph-plus text-[10px]"></i>
        </div>
      </div>
    </button>
  </div>

  <!-- Board Area -->
  <main class="flex-1 overflow-x-auto px-6 pb-6 flex gap-6 items-start">
    
    <!-- Column: Backlog -->
    <div class="w-80 flex-shrink-0 flex flex-col max-h-full">
      <div class="flex items-center justify-between mb-4 px-2">
        <div class="flex items-center gap-2">
          <div class="w-2 h-2 rounded-full bg-ink/20"></div>
          <h3 class="font-bold text-sm tracking-tight">Backlog</h3>
          <span class="font-mono text-[9px] bg-ink/5 text-ink/60 px-2 py-0.5 rounded-full">3</span>
        </div>
        <i class="ph-bold ph-dots-three text-ink/30 cursor-pointer"></i>
      </div>
      <div class="flex-1 overflow-y-auto space-y-4 px-1 pb-4" id="col-backlog">
        <div class="k-card p-5 group hover:-translate-y-1 hover:shadow-ambient cubic-transition" onclick="moveTask(this, 'col-progress')">
          <div class="flex gap-2 mb-3">
            <span class="font-mono text-[8px] uppercase tracking-widest text-accent bg-accent/10 px-2 py-1 rounded">Design</span>
          </div>
          <h4 class="font-bold text-sm leading-tight mb-4">Design System Token Audit</h4>
          <div class="flex items-center justify-between mt-auto">
            <div class="flex -space-x-2">
              <div class="w-6 h-6 rounded-full bg-gray-200 border-2 border-white"></div>
              <div class="w-6 h-6 rounded-full bg-gray-300 border-2 border-white"></div>
            </div>
            <i class="ph-bold ph-arrow-right text-ink/20 group-hover:text-accent group-hover:translate-x-1 cubic-transition"></i>
          </div>
        </div>
        
        <div class="k-card p-5 group hover:-translate-y-1 hover:shadow-ambient cubic-transition" onclick="moveTask(this, 'col-progress')">
          <div class="flex gap-2 mb-3">
            <span class="font-mono text-[8px] uppercase tracking-widest text-purple-500 bg-purple-500/10 px-2 py-1 rounded">Backend</span>
          </div>
          <h4 class="font-bold text-sm leading-tight mb-4">Database Migration to V4</h4>
        </div>
      </div>
    </div>

    <!-- Column: In Progress -->
    <div class="w-80 flex-shrink-0 flex flex-col max-h-full">
      <div class="flex items-center justify-between mb-4 px-2">
        <div class="flex items-center gap-2">
          <div class="w-2 h-2 rounded-full bg-accent"></div>
          <h3 class="font-bold text-sm tracking-tight">In Progress</h3>
          <span class="font-mono text-[9px] bg-ink/5 text-ink/60 px-2 py-0.5 rounded-full" id="count-progress">1</span>
        </div>
        <i class="ph-bold ph-dots-three text-ink/30 cursor-pointer"></i>
      </div>
      <div class="flex-1 overflow-y-auto space-y-4 px-1 pb-4" id="col-progress">
        <div class="k-card p-5 group hover:-translate-y-1 hover:shadow-ambient cubic-transition" onclick="moveTask(this, 'col-done')">
          <div class="flex gap-2 mb-3">
            <span class="font-mono text-[8px] uppercase tracking-widest text-orange-500 bg-orange-500/10 px-2 py-1 rounded">Frontend</span>
          </div>
          <h4 class="font-bold text-sm leading-tight mb-4">Implement 'Double-Bezel' components across all routes</h4>
          <div class="w-full bg-ink/5 h-1.5 rounded-full mb-4 overflow-hidden">
            <div class="bg-accent h-full w-[60%] rounded-full"></div>
          </div>
          <div class="flex items-center justify-between mt-auto">
            <div class="flex -space-x-2">
              <div class="w-6 h-6 rounded-full bg-gray-400 border-2 border-white"></div>
            </div>
            <i class="ph-bold ph-arrow-right text-ink/20 group-hover:text-green-500 group-hover:translate-x-1 cubic-transition"></i>
          </div>
        </div>
      </div>
    </div>

    <!-- Column: Done -->
    <div class="w-80 flex-shrink-0 flex flex-col max-h-full">
      <div class="flex items-center justify-between mb-4 px-2">
        <div class="flex items-center gap-2">
          <div class="w-2 h-2 rounded-full bg-green-500"></div>
          <h3 class="font-bold text-sm tracking-tight">Done</h3>
          <span class="font-mono text-[9px] bg-ink/5 text-ink/60 px-2 py-0.5 rounded-full" id="count-done">0</span>
        </div>
        <i class="ph-bold ph-dots-three text-ink/30 cursor-pointer"></i>
      </div>
      <div class="flex-1 overflow-y-auto space-y-4 px-1 pb-4" id="col-done">
        <!-- Done tasks will land here -->
      </div>
    </div>

  </main>

  <script>
    function moveTask(el, targetId) {
      // Simulate physical movement with CSS transitions
      el.classList.add('moving');
      
      setTimeout(() => {
        const targetCol = document.getElementById(targetId);
        targetCol.appendChild(el);
        
        // Update counts
        document.getElementById('count-progress').innerText = document.getElementById('col-progress').children.length;
        document.getElementById('count-done').innerText = document.getElementById('col-done').children.length;
        
        // Change onclick if it moved to done
        if (targetId === 'col-done') {
          el.onclick = null;
          el.classList.remove('hover:-translate-y-1', 'hover:shadow-ambient', 'cursor-grab');
          const arrow = el.querySelector('.ph-arrow-right');
          if(arrow) arrow.style.display = 'none';
        } else if (targetId === 'col-progress') {
          el.onclick = function() { moveTask(this, 'col-done') };
        }
        
        // Remove moving state
        setTimeout(() => el.classList.remove('moving'), 50);
      }, 300);
    }
  </script>
</body>
</html>
