<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina Mobile App - Ethereal Glass</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          colors: {
            deep: '#030303',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #030303; color: #FFFFFF; overflow-x: hidden; }
    
    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      z-index: -1;
      animation: pulse 8s cubic-bezier(0.32,0.72,0,1) infinite alternate;
    }
    
    @keyframes pulse {
      0% { transform: scale(1) translate(0, 0); opacity: 0.3; }
      100% { transform: scale(1.2) translate(5%, 5%); opacity: 0.6; }
    }

    .iphone-frame {
      border: 8px solid #1a1a1a;
      border-radius: 3rem;
      background: #000;
      box-shadow: 0 40px 80px -20px rgba(124, 58, 237, 0.2), inset 0 0 0 2px rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    
    .iphone-notch {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 120px; height: 25px;
      background: #1a1a1a;
      border-bottom-left-radius: 1rem; border-bottom-right-radius: 1rem;
      z-index: 50;
    }

    .doppel-dark {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 6px;
      border-radius: 2rem;
    }
    .doppel-dark-inner {
      background: #0A0A0A;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
      border-radius: calc(2rem - 6px);
    }
    
    .cubic-transition { transition: all 700ms cubic-bezier(0.32,0.72,0,1); }
  </style>
</head>
<body class="antialiased selection:bg-purple-600 selection:text-white min-h-screen flex items-center justify-center p-6 md:p-24 relative">

  <!-- Ethereal Mesh Background -->
  <div class="glow-orb bg-purple-600/40 w-[600px] h-[600px] top-[-200px] left-[-200px]"></div>
  <div class="glow-orb bg-emerald-600/20 w-[500px] h-[500px] bottom-[-100px] right-[-100px]" style="animation-delay: -4s;"></div>

  <div class="max-w-[1400px] w-full mx-auto grid grid-cols-1 md:grid-cols-2 gap-16 md:gap-32 items-center">
    
    <!-- Left: Typography -->
    <div class="flex flex-col items-start z-10">
      <div class="rounded-full px-4 py-1.5 text-[10px] uppercase tracking-[0.2em] border border-white/10 text-white/50 mb-8 font-mono bg-white/5 backdrop-blur-md">
        Lumina App V2.0
      </div>
      <h1 class="text-6xl md:text-8xl font-extrabold tracking-tighter leading-[0.9] mb-8">
        Clarity in <br>
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-emerald-400">Chaos.</span>
      </h1>
      <p class="text-white/50 max-w-sm text-lg leading-relaxed mb-12">
        Manage your finances with an interface that gets out of your way. Built with zero friction and absolute precision.
      </p>

      <div class="flex items-center gap-6">
        <button class="group doppel-dark flex items-center p-1.5 active:scale-95 cubic-transition">
          <div class="doppel-dark-inner bg-white text-black px-6 py-3 flex items-center gap-6 rounded-full hover:bg-gray-200 cubic-transition">
            <span class="font-bold text-sm">Download iOS</span>
            <div class="w-8 h-8 rounded-full bg-black/5 flex items-center justify-center group-hover:translate-x-1 cubic-transition">
              <i class="ph-fill ph-apple-logo text-black"></i>
            </div>
          </div>
        </button>
      </div>
    </div>

    <!-- Right: iPhone Mockup -->
    <div class="relative z-10 flex justify-center perspective-1000">
      <!-- Floating decorative elements -->
      <div class="absolute -left-12 top-1/4 doppel-dark p-1.5 w-48 z-20 hover:-translate-y-2 cubic-transition">
        <div class="doppel-dark-inner bg-black/80 backdrop-blur-xl p-4 flex items-center gap-4">
          <div class="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center text-purple-400">
            <i class="ph-bold ph-trend-up"></i>
          </div>
          <div>
            <div class="text-[10px] font-mono text-white/50 uppercase tracking-widest">+12.4%</div>
            <div class="text-sm font-bold">Portfolio Up</div>
          </div>
        </div>
      </div>

      <div class="iphone-frame w-[320px] h-[650px] transform rotate-[-2deg] hover:rotate-0 hover:scale-105 cubic-transition" id="phone">
        <div class="iphone-notch"></div>
        
        <!-- App Interface -->
        <div class="w-full h-full bg-[#050505] p-6 flex flex-col relative overflow-hidden">
          <!-- App Header -->
          <div class="mt-8 flex justify-between items-center mb-8">
            <div>
              <div class="text-[10px] text-white/40 uppercase tracking-widest font-mono mb-1">Total Balance</div>
              <div class="text-3xl font-bold tracking-tight">$42,890.00</div>
            </div>
            <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10">
              <img src="https://i.pravatar.cc/100?img=3" class="w-full h-full rounded-full opacity-80">
            </div>
          </div>

          <!-- Chart Area Mock -->
          <div class="h-32 w-full relative mb-8">
            <svg viewBox="0 0 200 100" class="w-full h-full preserve-aspect-none" style="overflow:visible">
              <defs>
                <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%" stop-color="#A78BFA" />
                  <stop offset="100%" stop-color="#34D399" />
                </linearGradient>
              </defs>
              <path d="M0,80 Q20,60 40,70 T80,40 T120,50 T160,20 T200,10" fill="none" stroke="url(#lineGrad)" stroke-width="4" stroke-linecap="round" />
            </svg>
            <div class="absolute right-0 top-0 w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_10px_rgba(52,211,153,0.8)]"></div>
          </div>

          <!-- Transactions -->
          <div class="flex-1 doppel-dark p-1 rounded-[2rem] -mx-2">
            <div class="doppel-dark-inner w-full h-full p-4 flex flex-col gap-4 overflow-hidden relative">
              <div class="text-[10px] uppercase font-mono tracking-widest text-white/30 border-b border-white/5 pb-2">Recent</div>
              
              <!-- Tx Item -->
              <div class="flex justify-between items-center group cursor-pointer" onclick="clickTx(this)">
                <div class="flex items-center gap-3">
                  <div class="w-10 h-10 rounded-2xl bg-white/5 flex items-center justify-center text-white/50 group-hover:bg-white/10 cubic-transition">
                    <i class="ph-bold ph-apple-logo"></i>
                  </div>
                  <div>
                    <div class="text-xs font-bold">Apple Store</div>
                    <div class="text-[9px] text-white/40">12:45 PM</div>
                  </div>
                </div>
                <div class="text-xs font-mono">- $1,299.00</div>
              </div>
              
              <!-- Tx Item -->
              <div class="flex justify-between items-center group cursor-pointer" onclick="clickTx(this)">
                <div class="flex items-center gap-3">
                  <div class="w-10 h-10 rounded-2xl bg-white/5 flex items-center justify-center text-white/50 group-hover:bg-white/10 cubic-transition">
                    <i class="ph-bold ph-coffee"></i>
                  </div>
                  <div>
                    <div class="text-xs font-bold">Ozone Coffee</div>
                    <div class="text-[9px] text-white/40">08:15 AM</div>
                  </div>
                </div>
                <div class="text-xs font-mono">- $4.50</div>
              </div>
            </div>
          </div>

          <!-- Bottom Bar -->
          <div class="absolute bottom-6 left-6 right-6 h-16 bg-white/10 backdrop-blur-2xl rounded-full border border-white/10 flex justify-between items-center px-8">
            <i class="ph-fill ph-house text-white text-xl"></i>
            <i class="ph-light ph-wallet text-white/40 text-xl hover:text-white cubic-transition"></i>
            <i class="ph-light ph-chart-pie-slice text-white/40 text-xl hover:text-white cubic-transition"></i>
            <i class="ph-light ph-gear text-white/40 text-xl hover:text-white cubic-transition"></i>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Parallax mouse effect on phone
    document.addEventListener('mousemove', (e) => {
      const phone = document.getElementById('phone');
      const xAxis = (window.innerWidth / 2 - e.pageX) / 40;
      const yAxis = (window.innerHeight / 2 - e.pageY) / 40;
      // Only apply if not hovered
      if (!phone.matches(':hover')) {
        phone.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
      }
    });

    // App Interaction
    function clickTx(el) {
      el.style.transform = 'scale(0.95)';
      el.style.opacity = '0.5';
      setTimeout(() => {
        el.style.transform = 'scale(1)';
        el.style.opacity = '1';
      }, 150);
    }
  </script>
</body>
</html>
